# ============================================================
# Build & Deploy Blog ke GitHub Pages
# Setiap perubahan konten/tema/konfigurasi memicu build ulang
# situs statis, lalu dipublikasikan otomatis ke GitHub Pages.
# ============================================================
name: Build and Deploy Blog

on:
  push:
    branches: [main]
    paths:
      - "content/**"
      - "themes/**"
      - "admin/**"
      - "build/**"
      - "public/**"
      - "config.json"
      - "package.json"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: # trigger manual dari tab Actions

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build static site
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
